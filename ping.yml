---
- name: AWX Connectivity Test
  hosts: all
  gather_facts: yes

  tasks:
    - name: Ping target
      ansible.builtin.ping:

    - name: Display hostname
      debug:
        msg: "{{ inventory_hostname }} - {{ ansible_hostname }}"

    - name: Display OS
      debug:
        msg: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
