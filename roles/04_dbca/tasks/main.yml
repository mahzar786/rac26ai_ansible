---
- name: Ensure oracle is member of ASM groups on all RAC nodes
  user:
    name: oracle
    groups: asmadmin,asmdba,asmoper
    append: yes
  become: yes

- name: Validate oracle user can access ASM from Grid home
  become: yes
  become_user: oracle
  shell: |
    export ORACLE_HOME=/u01/app/26ai/grid
    export ORACLE_SID=+ASM1
    export PATH=$ORACLE_HOME/bin:$PATH
    asmcmd lsdg | egrep 'DATA|FRA|OCR'
  register: oracle_asm_check
  changed_when: false
  failed_when: oracle_asm_check.rc != 0

- name: Clean old TESTCDB DBCA leftovers
  become: yes
  shell: |
    su - oracle -c "srvctl remove database -d TESTCDB -f" || true
    su - grid -c "asmcmd rm -rf +DATA/TESTCDB" || true
    su - grid -c "asmcmd rm -rf +FRA/TESTCDB" || true
    rm -rf /u01/app/oracle/cfgtoollogs/dbca/TESTCDB
  when: inventory_hostname in groups['rac_primary']

- name: Create RAC TESTCDB with TESTPDB
  become: yes
  become_user: oracle
  shell: |
    export ORACLE_HOME={{ db_home }}
    export ORACLE_BASE={{ oracle_base }}
    export PATH=$ORACLE_HOME/bin:$PATH

    dbca -silent -createDatabase \
      -templateName General_Purpose.dbc \
      -gdbName TESTCDB \
      -sid TESTCDB \
      -databaseConfigType RAC \
      -nodelist mzr1.lab.maz,mzr2.lab.maz \
      -createAsContainerDatabase true \
      -numberOfPDBs 1 \
      -pdbName TESTPDB \
      -storageType ASM \
      -diskGroupName DATA \
      -recoveryAreaDestination +FRA \
      -recoveryAreaSize 8000 \
      -sysPassword RacAttack123 \
      -systemPassword RacAttack123 \
      -pdbAdminPassword RacAttack123 \
      -characterSet AL32UTF8 \
      -totalMemory 1024 \
      -ignorePreReqs
  when: inventory_hostname in groups['rac_primary']
  changed_when: true
